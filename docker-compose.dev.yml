services:
  web:
    command: ["npm", "run", "dev", "--", "--hostname", "0.0.0.0", "--port", "3000"]
    environment:
      APP_URL: http://localhost:3000
      NEXTAUTH_URL: http://localhost:3000
      WATCHPACK_POLLING: "true"
    volumes:
      - .:/app
      - formflow_node_modules:/app/node_modules
      - formflow_next_cache:/app/.next

volumes:
  formflow_node_modules:
  formflow_next_cache:
