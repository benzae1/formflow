services:
  postgres:
    image: postgres:16
    container_name: formflow-postgres
    environment:
      POSTGRES_USER: formflow
      POSTGRES_PASSWORD: formflow
      POSTGRES_DB: formflow
    ports:
      - "5432:5432"
    volumes:
      - formflow_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U formflow -d formflow"]
      interval: 5s
      timeout: 5s
      retries: 20

  temporal:
    image: temporalio/auto-setup:1.25
    container_name: formflow-temporal
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=formflow
      - POSTGRES_PWD=formflow
      - POSTGRES_SEEDS=postgres
    ports:
      - "7233:7233"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  temporal-ui:
    image: temporalio/ui:latest
    container_name: formflow-temporal-ui
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    ports:
      - "8080:8080"
    depends_on:
      temporal:
        condition: service_started
    restart: unless-stopped

  init:
    build:
      context: .
    container_name: formflow-init
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://formflow:formflow@postgres:5432/formflow
      PRISMA_AUTO_REPAIR_SCHEMA: "true"
      TEMPORAL_ADDRESS: temporal:7233
      NEXTAUTH_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    command: ["npm", "run", "prisma:init"]
    restart: "no"

  web:
    build:
      context: .
    container_name: formflow-web
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://formflow:formflow@postgres:5432/formflow
      TEMPORAL_ADDRESS: temporal:7233
      NEXTAUTH_URL: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  worker:
    build:
      context: .
    container_name: formflow-worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://formflow:formflow@postgres:5432/formflow
      TEMPORAL_ADDRESS: temporal:7233
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
      init:
        condition: service_completed_successfully
    command: ["npm", "run", "worker"]
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'node.*worker' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

volumes:
  formflow_pg:
